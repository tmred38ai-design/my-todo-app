<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-page">
  <!-- Background slider -->
  <div id="bg-slider">
    <div class="bg-slide active" style="background-image:url('https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=1920&q=80')"></div>
    <div class="bg-slide" style="background-image:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1920&q=80')"></div>
    <div class="bg-slide" style="background-image:url('https://images.unsplash.com/photo-1510166089176-3780f01e2c7a?auto=format&fit=crop&w=1920&q=80')"></div>
  </div>

  <div class="layout">
    <!-- ── Sidebar ── -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-brand">Folders</span>
        <button id="btn-add-folder" class="btn-add-folder" title="Tạo folder mới">+</button>
      </div>

      <ul id="folder-list" class="folder-list">
        <li class="folder-item active" data-id="">
          <span class="folder-icon">📋</span>
          <span class="folder-name">Tất cả</span>
        </li>
      </ul>
    </nav>

    <!-- ── Main content ── -->
    <main class="app-container" id="main-content">
      <header class="app-header">
        <h1 id="current-folder-title">📋 Todo</h1>
        <div class="header-actions">
          <button id="btn-theme" class="btn-theme" title="Đổi theme">🎨</button>
          <button id="btn-logout" class="btn-logout">Đăng xuất</button>
        </div>
      </header>

      <form id="add-form" class="add-form">
        <input type="text" id="new-title" placeholder="Thêm việc cần làm..." required autocomplete="off" />
        <input type="date" id="new-due" />
        <button type="submit" class="btn-primary">Thêm</button>
      </form>

      <ul id="todo-list" class="todo-list"></ul>
      <p id="empty-state" class="empty-state hidden">Chưa có việc gì. Thêm task đầu tiên nào!</p>

      <!-- Done section -->
      <section id="done-section" class="done-section hidden">
        <div class="done-header">
          <span class="done-label">✓ Đã hoàn thành</span>
          <span id="done-count" class="done-count-badge">0</span>
        </div>
        <ul id="done-list" class="todo-list"></ul>
      </section>
    </main>
  </div>

  <!-- ── Detail panel ── -->
  <div id="detail-overlay" class="detail-overlay hidden">
    <div id="detail-panel" class="detail-panel">
      <div class="detail-header">
        <button id="detail-close" class="detail-close" title="Đóng">✕</button>
        <input type="text" id="detail-title" class="detail-title-input" placeholder="Tiêu đề task..." />
      </div>
      <div class="detail-body">
        <div class="detail-section">
          <label class="section-label">Deadline</label>
          <input type="date" id="detail-due" class="detail-input" />
        </div>
        <div class="detail-section">
          <label class="section-label">Nhắc nhở</label>
          <div class="reminder-row">
            <input type="datetime-local" id="detail-reminder" class="detail-input" />
            <select id="detail-repeat" class="detail-select">
              <option value="none">Không lặp</option>
              <option value="daily">Hằng ngày</option>
              <option value="weekly">Hằng tuần</option>
              <option value="monthly">Hằng tháng</option>
            </select>
          </div>
        </div>
        <div class="detail-section">
          <label class="section-label">Sub-tasks</label>
          <ul id="subtask-list" class="subtask-list"></ul>
          <form id="subtask-form" class="subtask-add-form">
            <input type="text" id="new-subtask" class="detail-input" placeholder="Thêm sub-task..." autocomplete="off" />
            <button type="submit" class="btn-add-subtask">+</button>
          </form>
        </div>
        <div class="detail-section">
          <label class="section-label">Ghi chú</label>
          <textarea id="detail-notes" class="detail-textarea" placeholder="Thêm ghi chú..."></textarea>
        </div>
        <div class="detail-section">
          <label class="section-label">Đính kèm</label>
          <label class="upload-btn">
            <input type="file" id="attachment-input" multiple style="display:none" />
            + Đính kèm file
          </label>
          <ul id="attachment-list" class="attachment-list"></ul>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
